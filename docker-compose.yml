services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      APP_DOMAIN: http://localhost:8080
      TRUST_PROXY: 1
      COOKIE_SECURE: false
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  redis-data:
